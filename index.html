<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HentaiKabar - Doujinshi Collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="HentaiKabar Logo" class="logo">
      </a>
      <span class="tagline">HentaiKabar</span>
    </div>
  </header>

  <main class="container">
    <div class="search-section">
      <input type="text" id="search" placeholder="Search by title, artist, tags, or language..." autocomplete="off">
    </div>

    <div id="grid" class="works-grid" aria-live="polite"></div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <p>No results found. Try a different search term.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© HentaiKabar</p>
    </div>
  </footer>

  <script>
    // Homepage logic — loads works.json and renders gallery
    (async function(){
      const grid = document.getElementById('grid');
      const searchInput = document.getElementById('search');
      const emptyState = document.getElementById('empty-state');
      let works = [];

      try {
        const res = await fetch('works.json');
        if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
        works = await res.json();
      } catch (err) {
        grid.innerHTML = '<div class="error-message">Unable to load works.json. Please check the file exists.</div>';
        console.error(err);
        return;
      }

      function createCard(work) {
        const card = document.createElement('a');
        card.href = `reader.html?path=${encodeURIComponent(work.path)}&p=1`;
        card.className = 'work-card';
        
        // Create card HTML structure
        card.innerHTML = `
          <div class="card-cover">
            <img src="${work.cover}" alt="${work.title}" loading="lazy">
          </div>
          <div class="card-info">
            <h3 class="card-title">${escapeHtml(work.title)}</h3>
            <div class="card-artist">${work.artist ? escapeHtml(work.artist) : 'Unknown Artist'}</div>
            <div class="card-tags">
              ${(work.tags || []).slice(0, 3).map(tag => `<span class="tag">${escapeHtml(tag)}</span>`).join('')}
              ${(work.tags || []).length > 3 ? `<span class="tag">+${work.tags.length - 3}</span>` : ''}
            </div>
            <div class="card-language">${work.language ? escapeHtml(work.language) : ''}</div>
          </div>
        `;
        return card;
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
          if (m === '&') return '&amp;';
          if (m === '<') return '&lt;';
          if (m === '>') return '&gt;';
          return m;
        });
      }

      function renderWorks(worksToRender) {
        grid.innerHTML = '';
        if (!worksToRender || worksToRender.length === 0) {
          emptyState.style.display = 'block';
          grid.style.display = 'none';
          return;
        }
        
        emptyState.style.display = 'none';
        grid.style.display = 'grid';
        
        worksToRender.forEach(work => {
          grid.appendChild(createCard(work));
        });
      }

      function filterWorks(searchTerm) {
        if (!searchTerm) return works;
        
        const term = searchTerm.toLowerCase().trim();
        return works.filter(work => {
          return (work.title || '').toLowerCase().includes(term) ||
                 (work.artist || '').toLowerCase().includes(term) ||
                 (work.language || '').toLowerCase().includes(term) ||
                 (work.tags || []).some(tag => tag.toLowerCase().includes(term));
        });
      }

      // Initial render
      renderWorks(works);
      
      // Search handler
      searchInput.addEventListener('input', (e) => {
        const filtered = filterWorks(e.target.value);
        renderWorks(filtered);
      });
    })();
  </script>
</body>
</html>
