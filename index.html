<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HentaiKabar - Doujinshi Collection</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="HentaiKabar Logo" class="logo">
      </a>
      <span class="tagline">HentaiKabar</span>
    </div>
  </header>

  <main class="container">
    <div class="search-section">
      <input type="text" id="search" placeholder="Search by title, artist, tags, or language..." autocomplete="off">
    </div>

    <div id="grid" class="works-grid" aria-live="polite"></div>

    <div id="empty-state" class="empty-state" style="display: none;">
      <p>No results found. Try a different search term.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© HentaiKabar</p>
    </div>
  </footer>

  <script>
    (function() {
      const grid = document.getElementById('grid');
      const searchInput = document.getElementById('search');
      const emptyState = document.getElementById('empty-state');
      let works = [];

      async function loadWorks() {
        try {
          const res = await fetch('works.json');
          if (!res.ok) throw new Error('HTTP error: ' + res.status);
          works = await res.json();
          renderWorks(works);
        } catch (err) {
          grid.innerHTML = '<div class="error-message">Unable to load works.json. Please check the file exists.</div>';
          console.error(err);
        }
      }

      function createCard(work) {
        const card = document.createElement('a');
        card.href = 'reader.html?path=' + encodeURIComponent(work.path) + '&p=1';
        card.className = 'work-card';
        
        function escape(str) {
          if (!str) return '';
          return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
          });
        }
        
        let tagsHtml = '';
        if (work.tags && work.tags.length) {
          const tagsToShow = work.tags.slice(0, 3);
          for (let i = 0; i < tagsToShow.length; i++) {
            tagsHtml += '<span class="tag">' + escape(tagsToShow[i]) + '</span>';
          }
          if (work.tags.length > 3) {
            tagsHtml += '<span class="tag">+' + (work.tags.length - 3) + '</span>';
          }
        }
        
        card.innerHTML = `
          <div class="card-cover">
            <img src="${escape(work.cover)}" alt="${escape(work.title)}" loading="lazy">
          </div>
          <div class="card-info">
            <h3 class="card-title">${escape(work.title)}</h3>
            <div class="card-artist">${work.artist ? escape(work.artist) : 'Unknown Artist'}</div>
            <div class="card-tags">${tagsHtml}</div>
            <div class="card-language">${work.language ? escape(work.language) : ''}</div>
          </div>
        `;
        return card;
      }

      function renderWorks(worksToRender) {
        grid.innerHTML = '';
        
        // Show empty state if no works
        if (!worksToRender || worksToRender.length === 0) {
          emptyState.style.display = 'block';
          grid.style.display = 'none';
          return;
        }
        
        // Hide empty state and show grid
        emptyState.style.display = 'none';
        grid.style.display = 'grid';
        
        for (let i = 0; i < worksToRender.length; i++) {
          grid.appendChild(createCard(worksToRender[i]));
        }
      }

      function filterWorks(searchTerm) {
        if (!searchTerm) return works;
        
        const term = searchTerm.toLowerCase().trim();
        const filtered = [];
        
        for (let i = 0; i < works.length; i++) {
          const work = works[i];
          let matches = false;
          
          if ((work.title || '').toLowerCase().includes(term)) matches = true;
          if (!matches && (work.artist || '').toLowerCase().includes(term)) matches = true;
          if (!matches && (work.language || '').toLowerCase().includes(term)) matches = true;
          
          if (!matches && work.tags) {
            for (let j = 0; j < work.tags.length; j++) {
              if (work.tags[j].toLowerCase().includes(term)) {
                matches = true;
                break;
              }
            }
          }
          
          if (matches) filtered.push(work);
        }
        
        return filtered;
      }

      loadWorks();
      
      searchInput.addEventListener('input', function(e) {
        const filtered = filterWorks(e.target.value);
        renderWorks(filtered);
      });
    })();
  </script>
</body>
</html>
