<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>HentaiKabar - Home</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-brand">
        <a href="index.html" class="brand-link">
          <img src="logo.png" alt="Logo" class="logo">
          <span class="tagline">HentaiKabar</span>
        </a>
      </div>
      <div class="header-controls">
        <button id="theme-toggle" class="theme-btn">☀️</button>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="search-wrapper">
      <input type="text" id="search" placeholder="Search title, artist..." autocomplete="off">
    </div>
    <div id="grid" class="works-grid"></div>
  </main>

  <script>
    (function() {
      const themeToggle = document.getElementById('theme-toggle');
      const grid = document.getElementById('grid');

      const applyTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        themeToggle.innerText = theme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', theme);
      };
      applyTheme(localStorage.getItem('theme') || 'dark');
      themeToggle.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

      async function loadData() {
        try {
          const res = await fetch('works.json');
          const data = await res.json();
          render(data);
          document.getElementById('search').oninput = (e) => {
            const term = e.target.value.toLowerCase();
            render(data.filter(w => w.title.toLowerCase().includes(term)));
          };
        } catch(e) { grid.innerHTML = "<p>Database Error</p>"; }
      }

      function render(data) {
        grid.innerHTML = data.map(work => `
          <a href="reader.html?path=${encodeURIComponent(work.path)}&p=1" class="work-card">
            <div class="card-cover"><img src="${work.cover}" loading="lazy"></div>
            <div class="card-info"><h3 class="card-title">${work.title}</h3></div>
          </a>
        `).join('');
      }
      loadData();
    })();
  </script>
</body>
</html>
