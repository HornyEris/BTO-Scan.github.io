<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reader - HentaiKabar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="progress-container"><div class="progress-bar" id="myBar"></div></div>

  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="Logo" class="logo">
      </a>
      <a href="index.html" class="home-link">← Back</a>
    </div>
  </header>

  <main class="reader-container container">
    <aside class="reader-sidebar" id="sidebar">
      <div id="cover" class="sidebar-cover"></div>
      <div id="meta" class="sidebar-meta"></div>
    </aside>

    <section class="reader-main">
      <div class="reader-controls">
        <button id="prev-page" class="nav-btn">Prev</button>
        <span id="page-indicator" class="page-counter">0 / 0</span>
        <button id="next-page" class="nav-btn">Next</button>
      </div>
      
      <div class="reader-view">
        <div class="page-image-container">
          <img id="current-page-img" alt="Loading...">
        </div>
      </div>
    </section>
  </main>

  <script>
    let currentWork = null, currentPageIndex = 0, currentPages = [];

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const path = params.get('path');
      const p = parseInt(params.get('p')) || 1;

      const res = await fetch('works.json');
      const works = await res.json();
      currentWork = works.find(w => w.path === path);
      
      if (currentWork) {
        currentPages = currentWork.pages || [];
        currentPageIndex = p - 1;
        renderUI();
        updatePage();
      }
    }

    function renderUI() {
      document.getElementById('cover').innerHTML = <img src="${currentWork.cover}">;
      document.getElementById('meta').innerHTML = 
        <h2>${currentWork.title}</h2>
        <p class="artist">${currentWork.artist}</p>
        <div class="tags">${currentWork.tags.map(t => <span class="tag">${t}</span>).join('')}</div>
      ;
    }

    function updatePage() {
      const img = document.getElementById('current-page-img');
      img.style.opacity = '0';
      setTimeout(() => {
        img.src = ${currentWork.path}/${currentPages[currentPageIndex]};
        img.onload = () => img.style.opacity = '1';
      }, 200);

      document.getElementById('page-indicator').innerText = ${currentPageIndex + 1} / ${currentPages.length};
      document.getElementById('prev-page').disabled = currentPageIndex === 0;
      document.getElementById('next-page').disabled = currentPageIndex === currentPages.length - 1;
      
      // Progress Bar
      const scrolled = ((currentPageIndex + 1) / currentPages.length) * 100;
      document.getElementById("myBar").style.width = scrolled + "%";
      
      const url = new URL(window.location);
      url.searchParams.set('p', currentPageIndex + 1);
      window.history.replaceState({}, '', url);
    }

    document.getElementById('prev-page').onclick = () => { if(currentPageIndex > 0) { currentPageIndex--; updatePage(); window.scrollTo(0,0); } };
    document.getElementById('next-page').onclick = () => { if(currentPageIndex < currentPages.length-1) { currentPageIndex++; updatePage(); window.scrollTo(0,0); } };
    document.onkeydown = (e) => { if(e.key === 'ArrowLeft') document.getElementById('prev-page').click(); if(e.key === 'ArrowRight') document.getElementById('next-page').click(); };

    init();
  </script>
</body>
</html>
