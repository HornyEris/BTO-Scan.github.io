<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reader - HentaiKabar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="logo.png" alt="HentaiKabar Logo" class="logo">
      </a>
      <a href="index.html" class="home-link">← Back to Gallery</a>
    </div>
  </header>

  <main class="reader-container">
    <aside class="reader-sidebar" id="sidebar">
      <div class="sidebar-cover" id="cover"></div>
      <div class="sidebar-meta" id="meta"></div>
    </aside>

    <section class="reader-main">
      <div class="reader-controls">
        <button id="prev-page" class="nav-btn" disabled>← Previous</button>
        <span id="page-indicator" class="page-counter">Page 1 / 1</span>
        <button id="next-page" class="nav-btn" disabled>Next →</button>
      </div>
      <div class="reader-view" id="reader-view">
        <div class="page-image-container">
          <img id="current-page-img" alt="Page" style="max-width:100%; height:auto;">
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© HentaiKabar</p>
    </div>
  </footer>

  <script>
    let currentWork = null;
    let currentPageIndex = 0;
    let currentPages = [];

    async function loadReader() {
      const url = new URL(window.location.href);
      const path = url.searchParams.get('path');
      const pageParam = parseInt(url.searchParams.get('p')) || 1;
      
      try {
        const res = await fetch('works.json');
        if (!res.ok) throw new Error('Failed to load works.json');
        const works = await res.json();
        currentWork = works.find(w => w.path === path);
        
        if (!currentWork) {
          document.getElementById('meta').innerHTML = '<p>Work not found.</p>';
          return;
        }
        
        currentPages = currentWork.pages || [];
        currentPageIndex = Math.min(Math.max(1, pageParam), currentPages.length) - 1;
        
        renderSidebar();
        updateReader();
        setupNavigation();
        updateUrlPageParam();
      } catch (err) {
        console.error(err);
        document.getElementById('meta').innerHTML = '<p>Error loading work.</p>';
      }
    }
    
    function renderSidebar() {
      const coverDiv = document.getElementById('cover');
      const metaDiv = document.getElementById('meta');
      
      coverDiv.innerHTML = `<img src="${currentWork.cover}" alt="${currentWork.title} cover">`;
      
      let tagsHtml = '';
      if (currentWork.tags && currentWork.tags.length) {
        tagsHtml = `<div class="sidebar-tags">
          ${currentWork.tags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}
        </div>`;
      }
      
      metaDiv.innerHTML = `
        <h2>${escapeHtml(currentWork.title)}</h2>
        <div class="sidebar-artist">${currentWork.artist ? escapeHtml(currentWork.artist) : 'Unknown Artist'}</div>
        <div class="sidebar-language">${currentWork.language ? escapeHtml(currentWork.language) : ''}</div>
        ${tagsHtml}
        <div class="sidebar-pages">${currentPages.length} pages</div>
      `;
    }
    
    function updateReader() {
      const img = document.getElementById('current-page-img');
      if (currentPages.length && currentPages[currentPageIndex]) {
        img.src = `${currentWork.path}/${currentPages[currentPageIndex]}`;
        img.alt = `Page ${currentPageIndex + 1}`;
      }
      
      document.getElementById('page-indicator').textContent = `Page ${currentPageIndex + 1} / ${currentPages.length}`;
      
      const prevBtn = document.getElementById('prev-page');
      const nextBtn = document.getElementById('next-page');
      prevBtn.disabled = currentPageIndex === 0;
      nextBtn.disabled = currentPageIndex === currentPages.length - 1;
    }
    
    function setupNavigation() {
      document.getElementById('prev-page').addEventListener('click', () => {
        if (currentPageIndex > 0) {
          currentPageIndex--;
          updateReader();
          updateUrlPageParam();
        }
      });
      
      document.getElementById('next-page').addEventListener('click', () => {
        if (currentPageIndex < currentPages.length - 1) {
          currentPageIndex++;
          updateReader();
          updateUrlPageParam();
        }
      });
      
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') {
          document.getElementById('prev-page').click();
        } else if (e.key === 'ArrowRight') {
          document.getElementById('next-page').click();
        }
      });
    }
    
    function updateUrlPageParam() {
      const url = new URL(window.location.href);
      url.searchParams.set('p', currentPageIndex + 1);
      window.history.replaceState({}, '', url);
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    loadReader();
  </script>
</body>
</html>
