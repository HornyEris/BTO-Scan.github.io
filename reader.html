<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reader - HentaiKabar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-brand">
        <a href="index.html" class="brand-link"><img src="logo.png" alt="Logo" class="logo"></a>
      </div>
      <div class="header-controls">
        <button id="theme-toggle" class="theme-btn">☀️</button>
        <a href="index.html" style="text-decoration:none; color:var(--text); margin-left:10px;">← Back</a>
      </div>
    </div>
  </header>

  <main class="container reader-container">
    <aside class="reader-sidebar" id="sidebar">Loading...</aside>
    <section class="reader-main">
      <div class="header-controls" style="justify-content:center; gap:20px; margin-bottom:15px;">
        <button id="prev" class="nav-btn">Prev</button>
        <span id="page-num">1 / 1</span>
        <button id="next" class="nav-btn">Next</button>
      </div>
      <div class="page-view"><img id="current-img" alt="Page"></div>
    </section>
  </main>

  <script>
    (function() {
      const themeToggle = document.getElementById('theme-toggle');
      const applyTheme = (theme) => {
        document.documentElement.setAttribute('data-theme', theme);
        themeToggle.innerText = theme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', theme);
      };
      applyTheme(localStorage.getItem('theme') || 'dark');
      themeToggle.onclick = () => applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');

      let work, idx = 0;
      async function init() {
        const path = new URLSearchParams(location.search).get('path');
        const res = await fetch('works.json');
        const works = await res.json();
        work = works.find(w => w.path === path);
        if(work) {
          document.getElementById('sidebar').innerHTML = `<img src="${work.cover}" style="width:100%; border-radius:8px;"><h3>${work.title}</h3>`;
          showPage();
        }
      }
      function showPage() {
        document.getElementById('current-img').src = `${work.path}/${work.pages[idx]}`;
        document.getElementById('page-num').innerText = `${idx+1} / ${work.pages.length}`;
        window.scrollTo(0,0);
      }
      document.getElementById('prev').onclick = () => { if(idx > 0) { idx--; showPage(); } };
      document.getElementById('next').onclick = () => { if(idx < work.pages.length-1) { idx++; showPage(); } };
      init();
    })();
  </script>
</body>
</html>
